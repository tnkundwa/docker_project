services:

  reverse-proxy:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # --- The MySQL Database ---
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret_root_pass
      MYSQL_DATABASE: todo_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret_app_pass
    # ports:
    #   - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp_user", "-psecret_app_pass"]
      timeout: 5s
      retries: 5
      interval: 5s

  # --- Database Graphical UI (phpMyAdmin) ---
  phpmyadmin:
    image: phpmyadmin:5.2.1
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret_root_pass
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pma.rule=Host(`db.localhost`)"
      - "traefik.http.routers.pma.entrypoints=web"
      - "traefik.http.services.pma.loadbalancer.server.port=80"
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    # ports:
    #   - "3000:3000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=secret_app_pass
      - MYSQL_DATABASE=todo_db
    depends_on:
      db:
        condition: service_healthy
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: frontend
    # ports:
    #   - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

volumes:
  db_data: